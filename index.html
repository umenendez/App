<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniTrack — Tu Lista de Anime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">ANI</span><span class="logo-accent">TRACK</span>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-label">Estado</p>
      <button class="nav-btn active" data-filter="all">
        <span class="nav-icon">⬡</span> Todo
        <span class="nav-count" id="count-all">0</span>
      </button>
      <button class="nav-btn" data-filter="Visto">
        <span class="nav-dot" style="background:#4ade80"></span> Visto
        <span class="nav-count" id="count-visto">0</span>
      </button>
      <button class="nav-btn" data-filter="Viendo">
        <span class="nav-dot" style="background:#60a5fa"></span> Viendo
        <span class="nav-count" id="count-viendo">0</span>
      </button>
      <button class="nav-btn" data-filter="Pendiente">
        <span class="nav-dot" style="background:#fbbf24"></span> Pendiente
        <span class="nav-count" id="count-pendiente">0</span>
      </button>
      <button class="nav-btn" data-filter="No visto">
        <span class="nav-dot" style="background:#94a3b8"></span> No visto
        <span class="nav-count" id="count-novisto">0</span>
      </button>
      <button class="nav-btn" data-filter="Abandonado">
        <span class="nav-dot" style="background:#f87171"></span> Abandonado
        <span class="nav-count" id="count-abandonado">0</span>
      </button>
    </nav>

    <div class="sidebar-genres" id="genreFilters">
      <p class="nav-label">Género</p>
      <!-- filled by JS -->
    </div>

    <div class="sidebar-stats">
      <div class="stat-item">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-score">—</span>
        <span class="stat-lbl">Media</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar anime… (Ctrl+K)" />
      </div>
      <div class="topbar-actions">
        <select class="sort-select" id="sortSelect">
          <option value="name">Nombre A-Z</option>
          <option value="score_desc">Puntuación ↓</option>
          <option value="score_asc">Puntuación ↑</option>
          <option value="recent">Reciente</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" title="Cuadrícula">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 0h8v8h-8z"/></svg>
          </button>
          <button class="view-btn" id="listBtn" title="Lista">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="add-btn" id="openModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Añadir
        </button>
      </div>
    </header>

    <!-- ACTIVE FILTERS -->
    <div class="active-filters" id="activeFilters"></div>

    <!-- GRID / LIST -->
    <div class="anime-grid" id="animeGrid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Cargando animes…</p>
      </div>
    </div>

    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">⊘</div>
      <p>No hay resultados</p>
      <span>Prueba con otros filtros</span>
    </div>
  </main>

  <!-- MODAL ADD/EDIT -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nuevo Anime</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="field-row">
          <div class="field">
            <label>Nombre *</label>
            <input type="text" id="fName" placeholder="Attack on Titan" />
          </div>
          <div class="field field-sm">
            <label>Puntuación</label>
            <input type="number" id="fScore" min="0" max="10" step="0.1" placeholder="8.5" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Género</label>
            <input type="text" id="fGenre" placeholder="Acción, Drama…" />
          </div>
          <div class="field">
            <label>Estado</label>
            <select id="fStatus">
              <option>No visto</option>
              <option>Pendiente</option>
              <option>Viendo</option>
              <option>Visto</option>
              <option>Abandonado</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Link</label>
          <input type="url" id="fLink" placeholder="https://myanimelist.net/…" />
        </div>
        <div class="field">
          <label>Descripción</label>
          <textarea id="fDesc" rows="3" placeholder="Sinopsis…"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" id="cancelModal">Cancelar</button>
          <button class="btn-primary" id="saveAnime">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay hidden" id="detailOverlay">
    <div class="modal modal-detail" id="detailModal">
      <button class="modal-close" id="closeDetail">✕</button>
      <div class="detail-hero">
        <img id="detailImg" src="" alt="" />
        <div class="detail-hero-overlay"></div>
        <div class="detail-hero-info">
          <span class="detail-status" id="detailStatus"></span>
          <h1 id="detailName"></h1>
          <div class="detail-meta">
            <span id="detailGenre"></span>
            <span class="detail-score" id="detailScore"></span>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <p id="detailDesc"></p>
        <div class="detail-actions">
          <a id="detailLink" href="#" target="_blank" class="btn-ghost">Ver en MAL →</a>
          <button class="btn-ghost" id="detailEdit">Editar</button>
          <button class="btn-danger" id="detailDelete">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
